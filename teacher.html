<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소래고 교사용 수강설계 현황 대시보드</title>
    <style>
        :root { 
            --primary: #0056b3; 
            --accent: #7cb342; 
            --bg: #f4f5f7; 
        }
        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: var(--bg); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* 사이드바 */
        .sidebar { 
            width: 320px; 
            background: white; 
            border-right: 1px solid #ddd; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.05); 
            z-index: 10; 
        }
        .sidebar-header { 
            padding: 25px 20px; 
            background: var(--primary); 
            color: white; 
            text-align: center; 
        }
        .sidebar-header h2 { margin: 0; font-size: 1.4rem; }
        
        .filter-container { 
            padding: 10px 15px; 
            background: #f8f9fa; 
            border-bottom: 1px solid #ddd; 
            display: flex; gap: 10px; 
        }
        .filter-select { 
            flex: 1; padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 0.95rem; 
        }
        .refresh-btn { 
            padding: 12px; background: #e6f0fa; color: var(--primary); 
            border: none; border-bottom: 1px solid #ddd; cursor: pointer; 
            font-size: 1rem; font-weight: bold; transition: 0.2s; 
        }
        .refresh-btn:hover { background: #d0e4f7; }
        
        .student-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .student-item { 
            padding: 15px 20px; border-bottom: 1px solid #eee; 
            cursor: pointer; display: flex; align-items: center; 
        }
        .student-item:hover { background: #f0f7ff; }
        .student-item.active { background: #e6f0fa; border-left: 5px solid var(--primary); font-weight: bold; }
        .stu-id-badge { 
            background: #555; padding: 4px 10px; border-radius: 12px; 
            font-size: 0.85rem; color: white; margin-right: 10px; font-weight: bold; 
        }
        
        /* 메인 탭 네비게이션 */
        .content-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        .top-nav { 
            background: white; padding: 15px 40px; border-bottom: 1px solid #ddd; 
            display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); z-index: 5; 
        }
        .nav-tab { 
            background: #f4f5f7; color: #555; border: 1px solid #ccc; 
            padding: 10px 18px; border-radius: 8px; font-size: 1rem; 
            font-weight: bold; cursor: pointer; transition: 0.2s; 
        }
        .nav-tab.active { 
            background: var(--primary); color: white; border-color: var(--primary); 
            box-shadow: 0 2px 6px rgba(0,86,179,0.2); 
        }

        /* 메인 콘텐츠 영역 */
        .main-content { 
            flex-grow: 1; padding: 30px; overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .empty-state { text-align: center; color: #888; margin-top: 150px; font-size: 1.2rem; line-height: 1.6; }
        .card { 
            background: white; border-radius: 12px; padding: 35px; 
            width: 100%; max-width: 1100px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        
        .card-header { 
            border-bottom: 3px solid #333; padding-bottom: 15px; margin-bottom: 25px; 
            display: flex; justify-content: space-between; align-items: flex-end; 
        }
        .delete-btn { 
            background: #d32f2f; color: white; border: none; padding: 10px 15px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; 
        }
        .delete-btn:hover { background: #b71c1c; }
        
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .info-table th { background: #f8f9fa; width: 15%; text-align: center; font-weight: bold; }
        
        .dashboard-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .dashboard-table th, .dashboard-table td { border: 1px solid #ccc; padding: 12px; vertical-align: middle; text-align: center; }
        .dashboard-table thead th { background: #e6f0fa; color: #0056b3; font-weight: bold; }
        
        .table-title { 
            font-size: 1.15rem; font-weight: bold; color: #333; margin: 25px 0 10px 0; 
            background: #eee; padding: 10px 15px; border-radius: 6px; 
            border-left: 5px solid var(--primary); 
        }
        .subj-tag { 
            display: inline-block; background: #fff; border: 1px solid #0056b3; 
            color: #0056b3; padding: 4px 12px; border-radius: 20px; 
            margin: 3px; font-size: 0.95rem; font-weight: bold; 
        }

        /* 통계 좌우 분할 및 진행바 스타일 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stats-table td { text-align: left !important; padding: 12px !important; }
        .bar-bg { background: #e9ecef; height: 10px; border-radius: 5px; margin-top: 6px; overflow: hidden; width: 100%; }
        .bar-fill-1 { background: var(--primary); height: 100%; }
        .bar-fill-2 { background: var(--accent); height: 100%; }
        .stat-count { font-weight: bold; font-size: 1.1rem; color: #333; }
        .stat-pct { color: #888; font-size: 0.9rem; margin-left: 5px; }
        .stat-header-main { margin-bottom: 30px; border-left: 10px solid #333; padding-left: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>수강설계 대시보드</h2>
        </div>
        <div class="filter-container">
            <select id="filter-grade" class="filter-select" onchange="applyFilter()">
                <option value="">전체 학년</option>
                <option value="1">1학년</option>
                <option value="2">2학년</option>
            </select>
            <select id="filter-class" class="filter-select" onchange="applyFilter()">
                <option value="">전체 반</option>
            </select>
        </div>
        <button class="refresh-btn" onclick="fetchData()">🔄 데이터 새로고침</button>
        <ul class="student-list" id="list-container">
            <li style="padding:20px; text-align:center;">데이터를 불러오는 중...</li>
        </ul>
    </div>

    <div class="content-wrapper">
        <div class="top-nav">
            <button class="nav-tab active" id="tab-btn-student" onclick="switchView('student')">👨‍🎓 학생별 현황</button>
            <button class="nav-tab" id="tab-btn-stats2" onclick="switchView('stats2')">📊 2학년 과목 통계</button>
            <button class="nav-tab" id="tab-btn-stats3" onclick="switchView('stats3')">📊 3학년 과목 통계</button>
        </div>

        <div class="main-content" id="view-student">
            <div class="empty-state" id="empty-state">👈 목록에서 학생의 학번과 이름을 선택해 주세요.</div>
            <div class="card" id="detail-card" style="display:none;">
                <div class="card-header">
                    <div>
                        <h2 id="d-title" style="color:var(--primary); margin:0;">학생 상세 정보</h2>
                        <span id="d-time" style="color:#888; font-size:0.9rem;"></span>
                    </div>
                    <button class="delete-btn" onclick="deleteCurrentStudent()">🗑️ 기록 삭제</button>
                </div>
                <table class="info-table">
                    <tr>
                        <th>학번</th><td id="d-id" style="font-weight:bold;"></td>
                        <th>이름</th><td id="d-name" style="font-weight:bold;"></td>
                    </tr>
                    <tr>
                        <th>희망직업</th><td id="d-job"></td>
                        <th>희망학과</th><td id="d-dept"></td>
                    </tr>
                </table>
                <div id="d-subjects-container"></div>
            </div>
        </div>

        <div class="main-content" id="view-stats2" style="display:none;">
            <div class="card">
                <div class="stat-header-main">
                    <h2 style="margin:0;">2학년 선택과목 통계 분석</h2>
                    <p style="color:#666; margin:5px 0 0 0;">※ 현재 1학년 학생들이 선택한 내년(2학년) 과목 집계입니다.</p>
                </div>
                <div id="stats2-container"></div>
            </div>
        </div>

        <div class="main-content" id="view-stats3" style="display:none;">
            <div class="card">
                <div class="stat-header-main">
                    <h2 style="margin:0;">3학년 선택과목 통계 분석</h2>
                    <p style="color:#666; margin:5px 0 0 0;">※ 현재 1학년과 2학년의 3학년 선택 내역을 분리하여 집계합니다.</p>
                </div>
                <div id="stats3-container"></div>
            </div>
        </div>
    </div>

    <script>
        // ★ 선생님의 최신 구글 Apps Script 배포 URL ★
        const scriptUrl = "https://script.google.com/macros/s/AKfycby9MN_q7N9mz0RFjwq-WpJGtFnfKxIhMYCaykMc_KZG7tL-Hj0kk02Y5ycClmOJ5fz8_g/exec";
        
        let allData = []; 
        let filteredData = []; 
        let curId = ""; 
        let curName = "";

        window.onload = () => { 
            const cs = document.getElementById('filter-class');
            for(let i=1; i<=12; i++) { 
                const o = document.createElement('option'); 
                o.value = i; 
                o.innerText = i + "반"; 
                cs.appendChild(o); 
            }
            fetchData(); 
        };

        // 탭 화면 전환
        function switchView(v) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-btn-' + v).classList.add('active');
            
            document.getElementById('view-student').style.display = (v === 'student') ? 'flex' : 'none';
            document.getElementById('view-stats2').style.display = (v === 'stats2') ? 'flex' : 'none';
            document.getElementById('view-stats3').style.display = (v === 'stats3') ? 'flex' : 'none';
            
            if(v === 'stats2') renderStats2();
            if(v === 'stats3') renderStats3();
        }

        // 시트 데이터 가져오기
        async function fetchData() {
            const lc = document.getElementById('list-container'); 
            lc.innerHTML = '<li style="padding:20px; text-align:center;">데이터 불러오는 중...</li>';
            
            try {
                const res = await fetch(scriptUrl); 
                const data = await res.json();
                
                // 동일 학번 중복 제출 시 최신 데이터만 유지
                const map = {}; 
                data.forEach(d => { map[d.id] = d; });
                allData = Object.values(map).sort((a,b) => String(a.id).localeCompare(String(b.id)));
                
                applyFilter();
            } catch(e) { 
                lc.innerHTML = '<li style="color:red; padding:20px;">데이터 로드 실패 (URL 확인 요망)</li>'; 
            }
        }

        // 필터(학년, 반) 적용
        function applyFilter() {
            const gf = document.getElementById('filter-grade').value; 
            const cf = document.getElementById('filter-class').value;
            
            filteredData = allData.filter(s => {
                const sid = String(s.id); 
                if(sid.length !== 5) return true;
                const g = sid[0]; 
                const c = parseInt(sid.substring(1,3), 10).toString();
                return (!gf || g === gf) && (!cf || c === cf);
            });
            renderList();
        }

        // 왼쪽 학생 목록 그리기
        function renderList() {
            const lc = document.getElementById('list-container'); 
            lc.innerHTML = '';
            
            if(filteredData.length === 0) { 
                lc.innerHTML = '<li style="padding:20px; color:#888;">조회된 학생 없음</li>'; 
                return; 
            }
            
            filteredData.forEach((s, i) => {
                const li = document.createElement('li'); 
                li.className = 'student-item';
                li.innerHTML = `<span class="stu-id-badge">${s.id}</span> <span>${s.name}</span>`;
                li.onclick = () => showDetail(i, li); 
                lc.appendChild(li);
            });
        }

        // 특정 학생 정보 상세 보기
        function showDetail(idx, li) {
            document.querySelectorAll('.student-item').forEach(e => e.classList.remove('active')); 
            li.classList.add('active');
            
            const s = filteredData[idx]; 
            curId = s.id; 
            curName = s.name;
            
            document.getElementById('d-time').innerText = `최종 제출 : ${s.timestamp}`;
            document.getElementById('d-id').innerText = s.id; 
            document.getElementById('d-name').innerText = s.name;
            document.getElementById('d-job').innerText = s.job || '-'; 
            document.getElementById('d-dept').innerText = s.dept || '-';
            
            let sd = null; 
            try { sd = JSON.parse(s.subjects); } catch(e) {}
            
            const tag = (str) => (!str || str === "-") ? '<span style="color:#aaa;">미선택</span>' : str.split(',').map(v => `<span class="subj-tag">${v.trim()}</span>`).join('');
            let h = '';
            
            if(sd) {
                // 1학년 학생인 경우에만 2학년 선택과목 표 노출
                if(!String(s.id).startsWith('2')) {
                    h += `
                    <div class="table-title">[ 2학년 선택과목 ]</div>
                    <table class="dashboard-table">
                        <thead><tr><th>과목군</th><th>1학기</th><th>2학기</th></tr></thead>
                        <tbody>
                            <tr><th>기/제/한/교</th><td>${tag(sd.y2_tech[0])}</td><td>${tag(sd.y2_tech[1])}</td></tr>
                            <tr><th>교과간 선택</th><td>${tag(sd.y2_elec[0])}</td><td>${tag(sd.y2_elec[1])}</td></tr>
                        </tbody>
                    </table>`;
                }
                h += `
                <div class="table-title">[ 3학년 선택과목 ]</div>
                <table class="dashboard-table">
                    <thead><tr><th>과목군</th><th>1학기</th><th>2학기</th></tr></thead>
                    <tbody>
                        <tr><th>예술</th><td>${tag(sd.y3_art[0])}</td><td>${tag(sd.y3_art[1])}</td></tr>
                        <tr><th>기/제/한/교</th><td>${tag(sd.y3_tech[0])}</td><td>${tag(sd.y3_tech[1])}</td></tr>
                        <tr><th>교과간 선택</th><td>${tag(sd.y3_elec[0])}</td><td>${tag(sd.y3_elec[1])}</td></tr>
                    </tbody>
                </table>`;
            } else {
                h = '<div style="padding:20px; color:#d32f2f;">오류: 새로운 양식으로 제출되지 않은 구버전 데이터입니다.</div>';
            }
            
            document.getElementById('d-subjects-container').innerHTML = h;
            document.getElementById('empty-state').style.display = 'none'; 
            document.getElementById('detail-card').style.display = 'block';
        }

        // 학생 기록 삭제 로직
        async function deleteCurrentStudent() {
            if(!curId || !confirm(`정말 ${curName}(${curId}) 학생의 기록을 삭제하시겠습니까?\n\n(삭제 후 복구 불가)`)) return;
            
            const btn = document.querySelector('.delete-btn');
            btn.disabled = true;
            btn.innerText = "삭제 중...";
            
            try {
                await fetch(scriptUrl, { 
                    method: "POST", 
                    mode: "no-cors", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ action: "delete", id: curId }) 
                });
                alert("삭제 완료"); 
                document.getElementById('detail-card').style.display = 'none'; 
                document.getElementById('empty-state').style.display = 'block';
                fetchData(); // 삭제 후 데이터 새로고침
            } catch(e) { 
                alert("삭제 실패"); 
            } finally {
                btn.disabled = false;
                btn.innerText = "🗑️ 기록 삭제";
            }
        }

        // 공통 테이블 생성 함수 (좌 1학기 / 우 2학기)
        function makeSplitTable(statGroup, total) {
            // 모든 선택 과목 추출
            const keys = Array.from(new Set([...Object.keys(statGroup.s1), ...Object.keys(statGroup.s2)])).sort();
            
            // 학기별 테이블 생성
            const buildSem = (semData, barClass, semTitle) => {
                let inner = `
                <table class="dashboard-table stats-table">
                    <thead>
                        <tr><th colspan="2" style="background:#e6f0fa; color:#0056b3;">${semTitle}</th></tr>
                        <tr><th style="width:40%;">과목명</th><th style="width:60%;">인원 (비율)</th></tr>
                    </thead>
                    <tbody>`;
                
                if(keys.length === 0) {
                    inner += `<tr><td colspan="2" style="text-align:center; color:#888;">선택 내역 없음</td></tr>`;
                } else {
                    keys.forEach(k => {
                        const c = semData[k] || 0; 
                        const p = total > 0 ? ((c / total) * 100).toFixed(1) : 0;
                        inner += `
                        <tr>
                            <td><strong>${k}</strong></td>
                            <td>
                                <span class="stat-count">${c}명</span> <span class="stat-pct">(${p}%)</span>
                                <div class="bar-bg"><div class="${barClass}" style="width:${p}%;"></div></div>
                            </td>
                        </tr>`;
                    });
                }
                return inner + `</tbody></table>`;
            };
            
            return `
            <div class="stats-grid">
                ${buildSem(statGroup.s1, 'bar-fill-1', '📌 1학기')}
                ${buildSem(statGroup.s2, 'bar-fill-2', '📌 2학기')}
            </div>`;
        }

        // [통계 뷰 2] 2학년 과목 통계 (현재 1학년 데이터만 추출)
        function renderStats2() {
            const g1Data = filteredData.filter(s => String(s.id).startsWith('1'));
            const stats = { tech: {s1:{}, s2:{}}, elec: {s1:{}, s2:{}} };
            
            g1Data.forEach(s => {
                let sd; try { sd = JSON.parse(s.subjects); } catch(e) { return; }
                
                const tally = (target, semIdx, arr) => { 
                    if(!arr || !arr[semIdx] || arr[semIdx]==='-') return; 
                    arr[semIdx].split(',').forEach(v => { 
                        const n = v.trim(); 
                        if(n) target[n] = (target[n] || 0) + 1; 
                    }); 
                };
                
                tally(stats.tech.s1, 0, sd.y2_tech); tally(stats.tech.s2, 1, sd.y2_tech);
                tally(stats.elec.s1, 0, sd.y2_elec); tally(stats.elec.s2, 1, sd.y2_elec);
            });
            
            let h = `<div class="table-title">■ 기/제/한/교 (택1) - <span style="font-weight:normal; font-size:0.9rem;">기준 인원: ${g1Data.length}명</span></div>` 
                  + makeSplitTable(stats.tech, g1Data.length);
            h += `<div class="table-title">■ 교과간 선택 (택4) - <span style="font-weight:normal; font-size:0.9rem;">기준 인원: ${g1Data.length}명</span></div>` 
               + makeSplitTable(stats.elec, g1Data.length);
               
            document.getElementById('stats2-container').innerHTML = h;
        }

        // [통계 뷰 3] 3학년 과목 통계 (1학년과 2학년 분리)
        function renderStats3() {
            const g1Data = filteredData.filter(s => String(s.id).startsWith('1'));
            const g2Data = filteredData.filter(s => String(s.id).startsWith('2'));
            
            const getGroupStats = (dataList) => {
                const s = { art: {s1:{}, s2:{}}, tech: {s1:{}, s2:{}}, elec: {s1:{}, s2:{}} };
                dataList.forEach(st => {
                    let sd; try { sd = JSON.parse(st.subjects); } catch(e) { return; }
                    
                    const tally = (target, semIdx, arr) => { 
                        if(!arr || !arr[semIdx] || arr[semIdx]==='-') return; 
                        arr[semIdx].split(',').forEach(v => { 
                            const n = v.trim(); 
                            if(n) target[n] = (target[n] || 0) + 1; 
                        }); 
                    };
                    
                    tally(s.art.s1, 0, sd.y3_art); tally(s.art.s2, 1, sd.y3_art);
                    tally(s.tech.s1, 0, sd.y3_tech); tally(s.tech.s2, 1, sd.y3_tech);
                    tally(s.elec.s1, 0, sd.y3_elec); tally(s.elec.s2, 1, sd.y3_elec);
                });
                return s;
            };
            
            const s1 = getGroupStats(g1Data); 
            const s2 = getGroupStats(g2Data);
            
            // 1학년이 제출한 3학년 계획
            let h = `<h3 style="background:#0056b3; color:white; padding:12px 15px; border-radius:5px; margin-bottom: 20px;">[1] 현재 1학년의 3학년 선택 계획 (대상: ${g1Data.length}명)</h3>`;
            h += `<div class="table-title">■ 예술 (택1)</div>` + makeSplitTable(s1.art, g1Data.length);
            h += `<div class="table-title">■ 기/제/한/교 (택1)</div>` + makeSplitTable(s1.tech, g1Data.length);
            h += `<div class="table-title">■ 교과간 선택 (택4)</div>` + makeSplitTable(s1.elec, g1Data.length);
            
            // 2학년이 제출한 3학년 확정
            h += `<h3 style="background:#7cb342; color:white; padding:12px 15px; border-radius:5px; margin-top:60px; margin-bottom: 20px;">[2] 현재 2학년의 차년도(3학년) 확정 선택 (대상: ${g2Data.length}명)</h3>`;
            h += `<div class="table-title">■ 예술 (택1)</div>` + makeSplitTable(s2.art, g2Data.length);
            h += `<div class="table-title">■ 기/제/한/교 (택1)</div>` + makeSplitTable(s2.tech, g2Data.length);
            h += `<div class="table-title">■ 교과간 선택 (택4)</div>` + makeSplitTable(s2.elec, g2Data.length);
            
            document.getElementById('stats3-container').innerHTML = h;
        }
    </script>
