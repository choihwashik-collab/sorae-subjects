<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소래고 교사용 대시보드</title>
    <style>
        :root { --primary: #0056b3; --bg: #f4f5f7; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .sidebar-header { padding: 25px 20px; background: var(--primary); color: white; text-align: center; }
        .filter-container { padding: 10px 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; gap: 10px; }
        .filter-select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .student-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .student-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; }
        .student-item:hover { background: #f0f7ff; }
        .student-item.active { background: #e6f0fa; border-left: 5px solid var(--primary); font-weight: bold; }
        .stu-id-badge { background: #555; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; color: white; margin-right: 10px; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 900px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); display: none; }
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 15px; text-align: left; }
        .info-table th { background: #f8f9fa; width: 20%; font-weight: bold; text-align: center; }
        .dashboard-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .dashboard-table th, .dashboard-table td { border: 1px solid #ccc; padding: 15px; text-align: center; }
        .dashboard-table thead th { background: #e6f0fa; color: #0056b3; }
        .dashboard-table tbody th { background: #f8f9fa; width: 25%; }
        .table-title { font-size: 1.2rem; font-weight: bold; margin: 25px 0 10px 0; background: #eee; padding: 10px; border-radius: 6px; }
        .subj-tag { display: inline-block; background: #fff; border: 1px solid #0056b3; color: #0056b3; padding: 5px 12px; border-radius: 20px; margin: 3px; font-size: 0.95rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>수강설계 현황</h2></div>
        <div class="filter-container">
            <select id="f-grade" class="filter-select" onchange="applyFilter()"><option value="">전체 학년</option><option value="1">1학년</option><option value="2">2학년</option></select>
            <select id="f-class" class="filter-select" onchange="applyFilter()"><option value="">전체 반</option></select>
        </div>
        <button onclick="fetchData()" style="padding:10px; cursor:pointer;">🔄 데이터 새로고침</button>
        <ul class="student-list" id="list-container"></ul>
    </div>
    <div class="main-content">
        <div id="empty-state">👈 학생을 선택해 주세요.</div>
        <div class="card" id="detail-card">
            <h2 id="d-title" style="color:var(--primary); margin-top:0;">학생 상세 정보</h2>
            <table class="info-table">
                <tr><th>학번</th><td id="d-id"></td><th>이름</th><td id="d-name"></td></tr>
                <tr><th>희망직업</th><td id="d-job"></td><th>희망학과</th><td id="d-dept"></td></tr>
            </table>
            <div id="d-subjects-container"></div>
        </div>
    </div>
    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxGeoTY6MxVoCAeyCo-0BZ_-a5piwh7-QsGVpd200_197mcAe1L23DSxibs98BC3KMcpg/exec";
        let allData = []; let filteredData = [];

        window.onload = () => { 
            const cs = document.getElementById('f-class');
            for(let i=1; i<=12; i++) { const o = document.createElement('option'); o.value = i; o.innerText = i + "반"; cs.appendChild(o); }
            fetchData(); 
        };

        async function fetchData() {
            try {
                const res = await fetch(scriptUrl); const data = await res.json();
                const latest = {}; data.forEach(item => { latest[item.id] = item; });
                allData = Object.values(latest).sort((a,b) => a.id.localeCompare(b.id));
                applyFilter();
            } catch(e) { alert("데이터 로딩 실패"); }
        }

        function applyFilter() {
            const gf = document.getElementById('f-grade').value; const cf = document.getElementById('f-class').value;
            filteredData = allData.filter(s => {
                const sid = String(s.id); const g = sid[0]; const c = parseInt(sid.substring(1,3), 10).toString();
                return (!gf || g === gf) && (!cf || c === cf);
            });
            renderList();
        }

        function renderList() {
            const lc = document.getElementById('list-container'); lc.innerHTML = '';
            filteredData.forEach((s, idx) => {
                const li = document.createElement('li'); li.className = 'student-item';
                li.innerHTML = `<span class="stu-id-badge">${s.id}</span> ${s.name}`;
                li.onclick = () => showDetail(idx, li); lc.appendChild(li);
            });
        }

        function showDetail(idx, li) {
            document.querySelectorAll('.student-item').forEach(e => e.classList.remove('active')); li.classList.add('active');
            const s = filteredData[idx]; const isG2 = String(s.id).startsWith('2');
            document.getElementById('d-id').innerText = s.id; document.getElementById('d-name').innerText = s.name;
            document.getElementById('d-job').innerText = s.job; document.getElementById('d-dept').innerText = s.dept;
            
            let sd = JSON.parse(s.subjects);
            const tag = (str) => (!str || str === "-") ? "미선택" : str.split(',').map(v => `<span class="subj-tag">${v.trim()}</span>`).join('');
            
            let h = '';
            if(!isG2) {
                h += `<div class="table-title">[ 2학년 선택과목 ]</div><table class="dashboard-table"><thead><tr><th>과목군</th><th>1학기</th><th>2학기</th></tr></thead><tbody>
                <tr><th>기/제/한/교</th><td>${tag(sd.y2_tech[0])}</td><td>${tag(sd.y2_tech[1])}</td></tr>
                <tr><th>교과간 선택</th><td>${tag(sd.y2_elec[0])}</td><td>${tag(sd.y2_elec[1])}</td></tr></tbody></table>`;
            }
            h += `<div class="table-title">[ 3학년 선택과목 ]</div><table class="dashboard-table"><thead><tr><th>과목군</th><th>1학기</th><th>2학기</th></tr></thead><tbody>
            <tr><th>예술</th><td>${tag(sd.y3_art[0])}</td><td>${tag(sd.y3_art[1])}</td></tr>
            <tr><th>기/제/한/교</th><td>${tag(sd.y3_tech[0])}</td><td>${tag(sd.y3_tech[1])}</td></tr>
            <tr><th>교과간 선택</th><td>${tag(sd.y3_elec[0])}</td><td>${tag(sd.y3_elec[1])}</td></tr></tbody></table>`;
            
            document.getElementById('d-subjects-container').innerHTML = h;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('detail-card').style.display = 'block';
        }
    </script>
</body>
</html>
